<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Creality Camera</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #f4f7f9;
    }

    body { position: relative; }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .controls {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 9px;
      background: rgba(18, 22, 25, .82);
      color: #f4f7f9;
      font: 600 13px/1.2 inherit;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }

    button:hover { background: rgba(39, 45, 49, .94); }
    button:disabled { cursor: wait; opacity: .55; }
    button.active {
      border-color: rgba(75, 218, 145, .58);
      background: rgba(29, 89, 60, .88);
    }

    .printer-panel {
      position: absolute;
      top: 56px;
      right: 12px;
      z-index: 2;
      width: min(410px, calc(100% - 24px));
      max-height: calc(100% - 80px);
      overflow: auto;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 14px;
      background: rgba(15, 19, 22, .92);
      box-shadow: 0 18px 45px rgba(0, 0, 0, .35);
      backdrop-filter: blur(12px);
    }

    .printer-panel[hidden] { display: none; }

    .print-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .print-state {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #58dfa0;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .06em;
    }

    .print-state::before {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 12px currentColor;
      content: "";
    }

    .print-state[data-state="paused"],
    .print-state[data-state="processing"] { color: #ffbd59; }
    .print-state[data-state="error"],
    .print-state[data-state="stopped"] { color: #ff7373; }
    .print-state[data-state="completed"] { color: #6ab8ff; }
    .print-state[data-state="idle"],
    .print-state[data-state="connecting"] { color: #aeb8be; }

    .progress-value {
      font-size: 24px;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .file-name {
      overflow: hidden;
      margin: 9px 0 14px;
      color: #f4f7f9;
      font-size: 14px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .progress-track {
      height: 6px;
      overflow: hidden;
      margin-bottom: 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .1);
    }

    .progress-bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #36c981, #63e5a8);
      transition: width .35s ease;
    }

    .metrics {
      display: grid;
      grid-template-columns: minmax(0, .82fr) minmax(0, 1.18fr);
      gap: 9px;
    }

    .metric {
      min-width: 0;
      padding: 10px 11px;
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: 10px;
      background: rgba(255, 255, 255, .045);
    }

    .metric.wide { grid-column: 1 / -1; }

    .metric-label {
      display: block;
      margin-bottom: 4px;
      color: #96a2a9;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    .metric-value {
      display: block;
      overflow: hidden;
      font-size: 13px;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .telemetry-table {
      width: 100%;
      margin-top: 2px;
      border-collapse: collapse;
      table-layout: fixed;
      font-variant-numeric: tabular-nums;
    }

    .telemetry-table th,
    .telemetry-table td {
      padding: 3px 5px;
      text-align: center;
      white-space: nowrap;
    }

    .telemetry-table thead th,
    .telemetry-table tbody th {
      color: #96a2a9;
      font-size: 9px;
      font-weight: 750;
      letter-spacing: .045em;
      text-transform: uppercase;
    }

    .telemetry-table tbody th { text-align: left; }

    .telemetry-table td {
      font-size: 12px;
      font-weight: 700;
    }

    .telemetry-table th + th,
    .telemetry-table th + td,
    .telemetry-table td + td {
      border-left: 1px solid rgba(255, 255, 255, .07);
    }

    .temperature-table th:first-child { width: 58px; }
    .fan-table th,
    .fan-table td { padding-inline: 2px; }
    .fan-table thead th {
      font-size: 8px;
      letter-spacing: .02em;
    }
    .fan-table th:first-child { width: 34px; }
    .fan-metric { padding-inline: 8px; }

    .debug {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 2;
      max-height: 30vh;
      overflow: auto;
      margin: 0;
      padding: 11px 13px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 9px;
      background: rgba(18, 22, 25, .9);
      color: #dce3e7;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
      white-space: pre-wrap;
      backdrop-filter: blur(8px);
    }

    .debug[hidden] { display: none; }

    @media (max-width: 540px) {
      .controls {
        left: 12px;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      button { padding: 8px 10px; }
      .printer-panel { top: 92px; }
    }

    @media (max-width: 420px) {
      .metrics { grid-template-columns: 1fr; }
      .metric.wide { grid-column: auto; }
    }
  </style>
</head>
<body>
  <video id="camera" autoplay muted playsinline></video>

  <div class="controls">
    <button id="reconnect" type="button">Reconnect</button>
    <button id="togglePrinterStatus" type="button" aria-expanded="false">Printer Status</button>
    <button id="toggleDebug" type="button" aria-expanded="false">Debug</button>
  </div>

  <section id="printerPanel" class="printer-panel" aria-label="Printer status" hidden>
    <div class="print-summary">
      <span id="printState" class="print-state" data-state="connecting">CONNECTING</span>
      <span id="printProgress" class="progress-value">--%</span>
    </div>
    <div id="printFile" class="file-name" title="">Waiting for printer data...</div>
    <div class="progress-track" aria-hidden="true">
      <div id="progressBar" class="progress-bar"></div>
    </div>
    <div class="metrics">
      <div class="metric">
        <span class="metric-label">Layer</span>
        <span id="printLayer" class="metric-value">-- / --</span>
      </div>
      <div class="metric">
        <span class="metric-label">Elapsed / Remaining</span>
        <span id="printTime" class="metric-value">--:--:-- / --:--:--</span>
      </div>
      <div class="metric wide">
        <span class="metric-label">Temperatures</span>
        <table class="telemetry-table temperature-table">
          <thead>
            <tr>
              <th scope="col"></th>
              <th scope="col">Nozzle</th>
              <th scope="col">Bed</th>
              <th scope="col">Chamber</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th scope="row">Current</th>
              <td id="nozzleCurrent">-- °C</td>
              <td id="bedCurrent">-- °C</td>
              <td id="chamberCurrent">-- °C</td>
            </tr>
            <tr>
              <th scope="row">Target</th>
              <td id="nozzleTarget">-- °C</td>
              <td id="bedTarget">-- °C</td>
              <td id="chamberTarget"></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="metric">
        <span class="metric-label">Speed</span>
        <span id="printSpeed" class="metric-value">-- mm/s</span>
      </div>
      <div class="metric fan-metric">
        <span class="metric-label">Fans</span>
        <table class="telemetry-table fan-table">
          <thead>
            <tr>
              <th scope="col"></th>
              <th scope="col">Part</th>
              <th scope="col">Aux</th>
              <th scope="col">Chamber</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th scope="row">Speed</th>
              <td id="partFan">--%</td>
              <td id="auxiliaryFan">--%</td>
              <td id="chamberFan">--%</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <pre id="debug" class="debug" hidden></pre>

  <script>
    "use strict";

    const video = document.querySelector("#camera");
    const debugBox = document.querySelector("#debug");
    const printerPanel = document.querySelector("#printerPanel");
    const reconnectButton = document.querySelector("#reconnect");
    const togglePrinterStatusButton = document.querySelector("#togglePrinterStatus");
    const toggleDebugButton = document.querySelector("#toggleDebug");
    const printStateElement = document.querySelector("#printState");
    const printProgressElement = document.querySelector("#printProgress");
    const printFileElement = document.querySelector("#printFile");
    const progressBar = document.querySelector("#progressBar");
    const printLayerElement = document.querySelector("#printLayer");
    const printTimeElement = document.querySelector("#printTime");
    const nozzleCurrentElement = document.querySelector("#nozzleCurrent");
    const bedCurrentElement = document.querySelector("#bedCurrent");
    const chamberCurrentElement = document.querySelector("#chamberCurrent");
    const nozzleTargetElement = document.querySelector("#nozzleTarget");
    const bedTargetElement = document.querySelector("#bedTarget");
    const chamberTargetElement = document.querySelector("#chamberTarget");
    const printSpeedElement = document.querySelector("#printSpeed");
    const partFanElement = document.querySelector("#partFan");
    const auxiliaryFanElement = document.querySelector("#auxiliaryFan");
    const chamberFanElement = document.querySelector("#chamberFan");

    const printerHost = location.hostname;
    const printerAddress = printerHost.includes(":") ? `[${printerHost}]` : printerHost;

    let peerConnection = null;
    let printerSocket = null;
    let attemptId = 0;
    let telemetryReady = false;
    const logLines = [];
    const printerState = {};

    function setPrinterStatusOpen(open) {
      printerPanel.hidden = !open;
      togglePrinterStatusButton.classList.toggle("active", open);
      togglePrinterStatusButton.setAttribute("aria-expanded", String(open));
    }

    function setDebugOpen(open) {
      debugBox.hidden = !open;
      toggleDebugButton.classList.toggle("active", open);
      toggleDebugButton.setAttribute("aria-expanded", String(open));
    }

    function log(message) {
      const line = `${new Date().toLocaleTimeString()}  ${message}`;
      logLines.push(line);
      debugBox.textContent = logLines.join("\n");
      console.log(`[Creality Camera] ${message}`);
    }

    function numeric(value, fallback = 0) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function formatDuration(value) {
      if (value === undefined || value === null || !Number.isFinite(Number(value))) return "--:--:--";
      const seconds = Math.max(0, Math.round(Number(value)));
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const remainder = seconds % 60;
      return [hours, minutes, remainder].map(part => String(part).padStart(2, "0")).join(":");
    }

    function formatTemperature(value) {
      if (!Number.isFinite(Number(value)) || Number(value) <= 0) return "-- °C";
      return `${Math.round(Number(value))} °C`;
    }

    function getFileName(path) {
      if (!path) return "No active print";
      return String(path).split(/[\\/]/).pop().replace(/\.gcode$/i, "");
    }

    function getFriendlyState() {
      if (!telemetryReady) return { label: "CONNECTING", key: "connecting" };
      const errorCode = numeric(printerState.err?.errcode, 0);
      const rawState = numeric(printerState.state, -1);
      const progress = numeric(printerState.printProgress ?? printerState.dProgress, 0);
      const hasFile = Boolean(printerState.printFileName);

      if (errorCode) return { label: "ERROR", key: "error" };
      if (hasFile && progress >= 100) return { label: "COMPLETED", key: "completed" };
      if (hasFile && rawState === 5) return { label: "PAUSED", key: "paused" };
      if (hasFile && rawState === 4) return { label: "STOPPED", key: "stopped" };
      if (hasFile && rawState === 1) return { label: "PRINTING", key: "printing" };
      if (hasFile && rawState === 0) return { label: "PROCESSING", key: "processing" };
      return { label: "IDLE", key: "idle" };
    }

    function renderPrinterStatus() {
      const state = getFriendlyState();
      printStateElement.textContent = state.label;
      printStateElement.dataset.state = state.key;

      if (!telemetryReady) {
        printProgressElement.textContent = "--%";
        printFileElement.textContent = "Waiting for printer data...";
        printFileElement.title = "";
        progressBar.style.width = "0%";
        printLayerElement.textContent = "-- / --";
        printTimeElement.textContent = "--:--:-- / --:--:--";
        nozzleCurrentElement.textContent = "-- °C";
        bedCurrentElement.textContent = "-- °C";
        chamberCurrentElement.textContent = "-- °C";
        nozzleTargetElement.textContent = "-- °C";
        bedTargetElement.textContent = "-- °C";
        chamberTargetElement.textContent = "";
        printSpeedElement.textContent = "-- mm/s";
        partFanElement.textContent = "--%";
        auxiliaryFanElement.textContent = "--%";
        chamberFanElement.textContent = "--%";
        return;
      }

      const progress = Math.min(100, Math.max(0, numeric(
        printerState.printProgress ?? printerState.dProgress,
        0
      )));
      const fileName = getFileName(printerState.printFileName);

      printProgressElement.textContent = `${Math.round(progress)}%`;
      printFileElement.textContent = fileName;
      printFileElement.title = fileName;
      progressBar.style.width = `${progress}%`;

      const layer = printerState.layer ?? "--";
      const totalLayer = printerState.TotalLayer ?? "--";
      printLayerElement.textContent = `${layer} / ${totalLayer}`;
      printTimeElement.textContent = `${formatDuration(printerState.printJobTime)} / ${formatDuration(printerState.printLeftTime)}`;

      nozzleCurrentElement.textContent = formatTemperature(printerState.nozzleTemp);
      bedCurrentElement.textContent = formatTemperature(printerState.bedTemp0);
      chamberCurrentElement.textContent = formatTemperature(printerState.boxTemp);
      nozzleTargetElement.textContent = formatTemperature(printerState.targetNozzleTemp);
      bedTargetElement.textContent = formatTemperature(printerState.targetBedTemp0);
      chamberTargetElement.textContent = numeric(printerState.targetBoxTemp, 0) > 0
        ? formatTemperature(printerState.targetBoxTemp)
        : "";

      const speed = Number.isFinite(Number(printerState.realTimeSpeed))
        ? Math.round(Number(printerState.realTimeSpeed))
        : "--";
      printSpeedElement.textContent = `${speed} mm/s`;

      const partFan = Math.round(numeric(printerState.modelFanPct, 0));
      const auxiliaryFan = Math.round(numeric(printerState.auxiliaryFanPct, 0));
      const chamberFan = Math.round(numeric(printerState.caseFanPct, 0));
      partFanElement.textContent = `${partFan}%`;
      auxiliaryFanElement.textContent = `${auxiliaryFan}%`;
      chamberFanElement.textContent = `${chamberFan}%`;
    }

    function updatePrinterState(update) {
      if (Object.keys(update).length) telemetryReady = true;
      Object.assign(printerState, update);
      renderPrinterStatus();
    }

    function waitForIce(pc, timeoutMs = 8000) {
      if (pc.iceGatheringState === "complete") return Promise.resolve();
      return new Promise(resolve => {
        const timeout = setTimeout(resolve, timeoutMs);
        pc.addEventListener("icegatheringstatechange", () => {
          if (pc.iceGatheringState === "complete") {
            clearTimeout(timeout);
            resolve();
          }
        });
      });
    }

    function getPrinterSession(currentAttempt, timeoutMs = 7000) {
      return new Promise((resolve, reject) => {
        const socket = new WebSocket(`ws://${printerAddress}:9999`);
        const session = { features: [], token: "" };
        let settled = false;
        printerSocket = socket;

        const fail = message => {
          if (settled) return;
          settled = true;
          clearTimeout(timeout);
          socket.close();
          reject(new Error(message));
        };

        const timeout = setTimeout(
          () => fail("The printer did not provide a video token."),
          timeoutMs
        );

        socket.addEventListener("open", () => {
          if (currentAttempt !== attemptId) return fail("Connection cancelled.");
          log("Control channel connected; requesting video token...");
          socket.send(JSON.stringify({ method: "get", params: { getToken: 1 } }));
        });

        socket.addEventListener("message", event => {
          if (event.data === "ok") return;
          if (currentAttempt !== attemptId) return fail("Connection cancelled.");

          try {
            const message = JSON.parse(event.data);
            const { videoToken, ...telemetry } = message;
            updatePrinterState(telemetry);
            if (Array.isArray(message.features)) session.features = message.features;
            if (message.videoToken && !settled) {
              settled = true;
              clearTimeout(timeout);
              session.token = message.videoToken.trim();
              resolve(session);
            }
          } catch {
            // Some telemetry messages are unrelated to the camera stream.
          }
        });

        socket.addEventListener("error", () => fail(`Could not connect to ${printerHost}:9999.`));
        socket.addEventListener("close", () => {
          if (!settled) fail("The printer closed the control connection.");
        });
      });
    }

    // Reproduce the filtering used by Creality Print 7.2: keep one dynamic
    // H.264 payload and preserve the ICE/DTLS lines at the end of the block.
    function filterCrealitySdp(sdp) {
      try {
        const lines = sdp.split("\r\n");
        const prefix = [];
        const suffix = [];
        const codecGroups = [];

        for (let index = 0; index < lines.length; index++) {
          const line = lines[index];
          if (line.includes("a=rtpmap:")) {
            const group = [];
            for (;;) {
              group.push(lines[index]);
              if (index + 1 === lines.length || lines[index + 1].includes("a=rtpmap:")) {
                codecGroups.push(group);
                break;
              }
              index++;
            }
          }
          if (codecGroups.length === 0) prefix.push(line);
        }

        const remove = [];
        for (let index = 0; index < codecGroups.length; index++) {
          if (index === codecGroups.length - 1) continue;
          let discard = true;

          for (const line of codecGroups[index]) {
            if (line.includes("a=rtpmap:")) {
              const payload = parseInt(line.split(" ")[0].split(":")[1], 10);
              if (payload < 96 || payload > 127) break;
            }
            if (/H264/i.test(line)) {
              discard = false;
              break;
            }
          }

          if (discard) remove.push(index);
        }

        for (let index = remove.length - 1; index >= 0; index--) {
          codecGroups.splice(remove[index], 1);
        }

        if (codecGroups.length) {
          const last = codecGroups[codecGroups.length - 1];
          const payload = parseInt(last[0].split(" ")[0].split(":")[1], 10);
          const codecLines = [];

          for (const line of last) {
            if (line.includes(`:${payload} `)) codecLines.push(line);
            else suffix.push(line);
          }

          const valid = codecLines.some(line => /H264/i.test(line))
            && payload >= 96
            && payload <= 127;
          if (valid) codecGroups[codecGroups.length - 1] = codecLines;
          else codecGroups.splice(codecGroups.length - 1, 1);
        }

        if (!codecGroups.length) return sdp;
        return [...prefix, ...codecGroups[0], ...suffix].join("\r\n");
      } catch (error) {
        log(`Could not filter the SDP: ${error.message}`);
        return sdp;
      }
    }

    function makeCandidatesNumeric(sdp) {
      let replacements = 0;
      const result = sdp.split("\r\n").map(line => {
        if (!line.startsWith("a=candidate:")) return line;
        const fields = line.split(" ");
        if (fields[4] && fields[4].endsWith(".local")) {
          // TEST-NET-1 is a reserved, non-routable address. The firmware only
          // needs a numeric IP here; ICE learns the real LAN route itself.
          fields[4] = "192.0.2.1";
          replacements++;
        }
        return fields.join(" ");
      }).join("\r\n");

      log(`Prepared ${replacements} WebRTC candidate(s).`);
      return result;
    }

    function closeConnections() {
      attemptId++;

      const oldPeer = peerConnection;
      peerConnection = null;
      if (oldPeer) oldPeer.close();

      const oldSocket = printerSocket;
      printerSocket = null;
      if (oldSocket) oldSocket.close();

      video.srcObject = null;
    }

    async function connect() {
      if (!/^https?:$/.test(location.protocol) || !printerHost) {
        throw new Error("Install this file in Fluidd and open it through http://PRINTER_IP:4408/camera.html.");
      }

      closeConnections();
      const currentAttempt = attemptId;
      logLines.length = 0;
      debugBox.textContent = "";
      for (const key of Object.keys(printerState)) delete printerState[key];
      telemetryReady = false;
      renderPrinterStatus();
      log(`Connecting to ${printerHost}...`);

      const session = await getPrinterSession(currentAttempt);
      if (currentAttempt !== attemptId) return;

      const encryptedProtocol = session.features.includes("videoInfo.videoEncryption");
      log(`Using ${encryptedProtocol ? "token-protected" : "legacy"} WebRTC protocol.`);

      const pc = new RTCPeerConnection({ iceServers: [] });
      peerConnection = pc;

      pc.addEventListener("connectionstatechange", () => {
        if (pc !== peerConnection) return;
        log(`Connection state: ${pc.connectionState}.`);
        if (pc.connectionState === "failed") setDebugOpen(true);
      });

      pc.addEventListener("iceconnectionstatechange", () => {
        if (pc === peerConnection) log(`ICE state: ${pc.iceConnectionState}.`);
      });

      pc.addEventListener("track", event => {
        if (pc !== peerConnection || event.track.kind !== "video") return;
        video.srcObject = event.streams[0] || new MediaStream([event.track]);
        video.play().catch(error => {
          log(`The browser did not start playback: ${error.message}`);
          setDebugOpen(true);
        });
      });

      const transceiver = pc.addTransceiver("video", { direction: "sendrecv" });
      const h264 = RTCRtpReceiver.getCapabilities("video").codecs
        .filter(codec => codec.mimeType.toLowerCase() === "video/h264");

      if (!h264.length) {
        throw new Error("This browser does not provide H.264 decoding for WebRTC.");
      }
      if (typeof transceiver.setCodecPreferences === "function") {
        transceiver.setCodecPreferences(h264);
      }

      await pc.setLocalDescription(await pc.createOffer());
      await waitForIce(pc);
      if (currentAttempt !== attemptId) return;

      const request = {
        type: "offer",
        sdp: filterCrealitySdp(makeCandidatesNumeric(pc.localDescription.sdp))
      };
      if (encryptedProtocol) request.token = session.token;

      const url = encryptedProtocol
        ? `http://${printerAddress}/call/webrtc_local`
        : `http://${printerAddress}:8000/call/webrtc_local`;
      log("Requesting the camera stream...");

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "plain/text" },
        body: btoa(JSON.stringify(request))
      });
      const responseText = (await response.text()).trim();

      if (!response.ok) throw new Error(`The printer returned HTTP ${response.status}.`);
      if (!responseText || responseText === "{}") {
        throw new Error("The printer did not return a WebRTC answer.");
      }

      let answer;
      try {
        answer = JSON.parse(atob(responseText));
      } catch {
        throw new Error("The printer returned an invalid video response.");
      }

      await pc.setRemoteDescription(new RTCSessionDescription(answer));
      log("Negotiation complete; waiting for video...");
    }

    async function start() {
      reconnectButton.disabled = true;
      try {
        await connect();
      } catch (error) {
        log(`${error.name}: ${error.message}`);
        setDebugOpen(true);
        console.error(error);
      } finally {
        reconnectButton.disabled = false;
      }
    }

    video.addEventListener("playing", () => {
      log(`Live video: ${video.videoWidth}x${video.videoHeight}.`);
    });

    reconnectButton.addEventListener("click", start);
    togglePrinterStatusButton.addEventListener("click", () => {
      setPrinterStatusOpen(printerPanel.hidden);
    });
    toggleDebugButton.addEventListener("click", () => setDebugOpen(debugBox.hidden));
    window.addEventListener("beforeunload", closeConnections);

    renderPrinterStatus();
    start();
  </script>
</body>
</html>
